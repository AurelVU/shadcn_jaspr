name: shadcn_jaspr
description: >-
  A Dart port of shadcn/ui for the Jaspr web framework. Beautiful, accessible,
  and customizable UI components built with Tailwind CSS.
  Live demo: https://aurelvu.github.io/shadcn_jaspr/
version: 0.4.1
homepage: https://github.com/AurelVU/shadcn_jaspr
repository: https://github.com/AurelVU/shadcn_jaspr
issue_tracker: https://github.com/AurelVU/shadcn_jaspr/issues
topics:
  - ui
  - components
  - web
  - jaspr
  - tailwind

environment:
  sdk: ^3.6.0

dependencies:
  jaspr: ^0.22.0
  universal_web: ^1.1.0
