name: shadcn_jaspr
description: >-
  A Dart port of shadcn/ui for the Jaspr web framework. Beautiful, accessible,
  and customizable UI components built with Tailwind CSS.
  Live demo: https://aurelvu.github.io/shadcn_jaspr/
version: 0.4.3
homepage: https://github.com/AurelVU/shadcn_jaspr
repository: https://github.com/AurelVU/shadcn_jaspr
issue_tracker: https://github.com/AurelVU/shadcn_jaspr/issues
topics:
  - ui
  - components
  - web
  - jaspr
  - tailwind

screenshots:
  - description: 'Input components: Button, Input, Checkbox, Switch, Select, Slider, and more'
    path: screenshots/01_inputs.png
  - description: 'Display components: Card, Badge, Avatar, Typography, Table, and more'
    path: screenshots/02_display.png
  - description: 'Navigation components: Tabs, Breadcrumb, Pagination, Sidebar'
    path: screenshots/03_navigation.png
  - description: 'Overlay components: Dialog, Sheet, Dropdown, Tooltip, Popover'
    path: screenshots/04_overlays.png
  - description: 'Dark mode support with full theme coverage'
    path: screenshots/09_dark_mode.png

environment:
  sdk: ^3.6.0

dependencies:
  jaspr: ^0.22.0
  universal_web: ^1.1.0
